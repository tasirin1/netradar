name: Build

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK
      run: |
        curl -sLo /tmp/tools.zip \
          https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        export ANDROID_SDK_ROOT=/opt/android
        sudo mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        unzip -q /tmp/tools.zip -d /tmp/
        sudo mv /tmp/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest/
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1
        echo "ANDROID_SDK_ROOT=/opt/android" >> $GITHUB_ENV
        echo "ANDROID_HOME=/opt/android" >> $GITHUB_ENV

    - name: Generate keystore
      run: |
        keytool -genkey -v -keystore scanner.keystore \
          -alias scanner -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass scanner123 -keypass scanner123 \
          -dname "CN=NetScan, OU=NetScan, O=NetScan, L=Unknown, ST=Unknown, C=ID"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Build signed APK
      env:
        ANDROID_SDK_ROOT: /opt/android
        ANDROID_HOME: /opt/android
        KEYSTORE_PATH: ${{ github.workspace }}/scanner.keystore
        KEYSTORE_PASSWORD: scanner123
        KEY_ALIAS: scanner
        KEY_PASSWORD: scanner123
      run: gradle assembleRelease --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NetScan-APK
        path: app/build/outputs/apk/release/*.apk
